<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock-Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Betting
            <div class="logo-wrapper">
                <img src="./images/360_F_168419369_XM588ym4hm0fKtKSZ7rjnpsCUIm5Xc3v.jpg" alt="stock predictor" class="logo">
            </div>
            Bala's</h1>
            <p class="desc">Stock Predictions</p>
        </div>
        <div class="section">
            <p class="info">Add up to 3 stock tickers below to get a super accurate stock predictions report 👇</p>
            <div class="input-btn">
                <input type="text" name="" id="" class="input" placeholder="ex:META">
                <button class="btn">+</button>
            </div>
            <p class="para">Your tickers will appear here......</p>
            <button class="report" disabled>GENERATE REPORT</button>
            <p class="footer">Always correct 15% of the time !!!</p>
        </div>
        <div class="output"> </div>
    </div>
    
    <script src="script.js" type="module"></script>
</body>
</html>
